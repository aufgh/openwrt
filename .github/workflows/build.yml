name: Build OpenWrt 25.12 firmware

on:
  workflow_dispatch:
    inputs:
      ttl_value:
        description: "TTL/hoplimit value for IPv4 and IPv6"
        required: false
        default: "64"
        type: string

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake cpio curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev \
            libncurses-dev libpython3-dev libreadline-dev libssl-dev libtool libyaml-dev \
            mkisofs msmtp ninja-build p7zip p7zip-full patch pkgconf python3 python3-pip \
            python3-ply python3-docutils qemu-utils re2c rsync scons squashfs-tools subversion \
            swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev zstd

      - name: Build firmware
        env:
          INPUT_TTL_VALUE: ${{ inputs.ttl_value }}
        run: bash scripts/build.sh

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: netcore-n30-pro-openwrt-25.12
          path: |
            openwrt/bin/targets/**
            openwrt/.config
          if-no-files-found: error
